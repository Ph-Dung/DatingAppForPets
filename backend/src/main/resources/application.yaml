spring:
  profiles:
    include: secret
  datasource:
    url: jdbc:postgresql://localhost:5432/petmatch
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    date-format: yyyy-MM-dd

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-this-jwt-secret-to-at-least-32-chars}
  expiration: ${JWT_EXPIRATION_MS:86400000}

app:
  cors:
    allowed-origins:
      - "*"

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: "https://api.openai.com/v1"
  model: "gpt-4-turbo"

community:
  moderation:
    enabled: false
    blocked-keywords: []
