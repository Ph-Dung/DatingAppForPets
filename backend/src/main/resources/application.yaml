spring:
  profiles:
    include: secret
  datasource:
    url: jdbc:postgresql://localhost:5433/petmatch_db
    username: postgres
    password: 123456

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: qwertyuiopasdfghjklzxcvbnmqwertyuiop
  expiration: 86400000

cloudinary:
  cloud-name: ${CLOUDINARY_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

openai:
  api-key: ${OPENAI_API_KEY}
  base-url: "https://api.groq.com/openai/v1"
  model: "llama-3.3-70b-versatile"
