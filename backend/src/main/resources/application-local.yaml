spring:
  datasource:
    url: jdbc:h2:mem:petmatch_local;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect

app:
  seed:
    enabled: false

cloudinary:
  cloud-name: test
  api-key: test
  api-secret: test

openai:
  api-key: test
